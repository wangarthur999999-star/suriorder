<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Bestellen</title>
<meta property="og:title" content="Wangs Eatery" id="og-title">
<meta property="og:description" content="Gerechten bestellen" id="og-desc">
<meta property="og:url" content="http://localhost:3456/order/demo" id="og-url">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%2316a34a'/><text x='16' y='24' text-anchor='middle' font-size='18'>🍽️</text></svg>">
<link rel="stylesheet" href="/shared.css">
<style>
  /* ═══════════════════════════════════════════
     SuriOrder — Order Page (Google Studio CSS)
     Adapted for JS class-toggle compatibility
     ═══════════════════════════════════════════ */

  /* ── Design Tokens ── */
  :root {
    --pri: #16a34a; --pri-dark: #15803d; --pri-light: #dcfce7; --pri-bg: #f0fdf4;
    --bg: #f5f5f5; --card: #fff; --border: #e5e7eb;
    --text: #1a1a1a; --text-sec: #4b5563; --muted: #6b7280;
    --accent: #f97316; --wa: #25D366; --wa-hover: #1fa954;
    --r-sm: 8px; --r: 10px; --r-lg: 14px; --r-xl: 18px; --r-2xl: 24px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --shadow-card: 0 2px 12px rgba(0,0,0,.06);
    --shadow-lift: 0 8px 24px rgba(0,0,0,.10);
    --touch: 44px; --touch-sm: 36px;
    --tran: 150ms ease; --tran-slow: 250ms ease;
    --safe-bot: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    max-width: 480px; margin: 0 auto;
    font-family: system-ui, -apple-system, sans-serif;
    background-color: #faf6eb;
    background-image: radial-gradient(#ebdcb9 1.2px, transparent 1.2px);
    background-size: 16px 16px;
    color: var(--text);
    min-height: 100vh;
    display: flex; flex-direction: column;
    overflow-x: hidden;
    padding-bottom: 24px;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ── Header (green gradient + radial highlight) ── */
  header {
    background: linear-gradient(135deg, var(--pri) 0%, var(--pri-dark) 100%);
    color: #fff; padding: 36px 20px 44px 20px;
    border-radius: 0 0 var(--r-2xl) var(--r-2xl);
    text-align: center; position: relative;
    display: flex; flex-direction: column; align-items: center;
    box-shadow: var(--shadow-card);
  }
  header::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.12) 0%, transparent 75%);
    pointer-events: none;
  }
  header > * { position: relative; }
  #shop-name {
    font-size: 2.1rem; font-weight: 700; margin: 16px 0 2px 0;
    letter-spacing: -0.5px;
  }
  #shop-desc {
    font-size: .85rem; color: rgba(255,255,255,.88); font-weight: 500;
    letter-spacing: 1px; margin: 0;
  }

  /* ── Language Switch (segmented pill) ── */
  .lang-switch {
    position: absolute; top: 14px; right: 16px;
    background: rgba(0,0,0,.15); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 9px; display: flex; padding: 2px; gap: 1px;
    border: 1px solid rgba(255,255,255,.1); z-index: 10;
  }
  .lang-switch button {
    background: transparent; color: rgba(255,255,255,.75);
    border: none; font-size: .7rem; font-weight: 700;
    padding: 4px 8px; border-radius: 7px; cursor: pointer;
    transition: all var(--tran); font-family: inherit;
  }
  .lang-switch button.active {
    background: #fff; color: var(--pri-dark);
    box-shadow: var(--shadow-sm);
  }

  /* ── WhatsApp Contact ── */
  .wa-contact {
    display: inline-flex; align-items: center; gap: 6px;
    background-color: var(--wa); color: #fff;
    padding: 8px 16px; font-size: .82rem; font-weight: 700;
    border-radius: var(--r-2xl); text-decoration: none;
    box-shadow: 0 4px 10px rgba(37,211,102,.25);
    margin-top: 14px; transition: all var(--tran);
    border: 1px solid rgba(255,255,255,.15); cursor: pointer;
  }
  .wa-contact:hover { background-color: var(--wa-hover); transform: translateY(-1px); }
  .wa-contact:active { transform: translateY(1px); }

  /* ── Category Nav (sticky, frosted glass, underline active) ── */
  .cat-nav {
    position: sticky; top: 0; z-index: 40;
    background: rgba(250,246,235,.95); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; overflow-x: auto; scrollbar-width: none;
    padding: 0 16px; gap: 18px;
  }
  .cat-nav::-webkit-scrollbar { display: none; }
  .cat-nav button {
    background: transparent; color: var(--text-sec);
    border: none; padding: 16px 2px; font-size: .88rem;
    font-weight: 600; cursor: pointer; white-space: nowrap;
    transition: all var(--tran); position: relative; font-family: inherit;
  }
  .cat-nav button.active {
    color: var(--pri); font-weight: 800;
  }
  .cat-nav button.active::after {
    content: ""; position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px; background-color: var(--pri); border-radius: 3px 3px 0 0;
  }

  /* ── Menu List & Paper Cards ── */
  .menu { padding: 8px 0 100px 0; display: flex; flex-direction: column; }
  .cat-title {
    font-size: .72rem; font-weight: 700; color: var(--muted);
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 24px 16px 6px 16px; text-align: left;
  }
  .item {
    background: var(--card); margin: 10px 16px; padding: 16px;
    border-radius: var(--r-lg); border: 1px solid rgba(0,0,0,.03);
    box-shadow: 0 2px 8px rgba(0,0,0,.02);
    display: flex; gap: 14px; position: relative;
    transition: transform var(--tran-slow), box-shadow var(--tran-slow);
    animation: fadeInUp .4s ease forwards; opacity: 0;
  }
  .item:active { transform: scale(.985); }
  .item-img {
    width: 72px; height: 72px; border-radius: var(--r);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.1rem; flex-shrink: 0; background-color: #faf6eb;
  }
  .item-img img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--r); }

  .item[data-cat="1"] .item-img { background: #dcfce7; }
  .item[data-cat="2"] .item-img { background: #fff7ed; }
  .item[data-cat="3"] .item-img { background: #dbeafe; }
  .item[data-cat="4"] .item-img { background: #f3e8ff; }
  .item[data-cat="5"] .item-img { background: #fef9c3; }
  .item-info { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; text-align: left; }
  .item-info h3 {
    font-size: .95rem; font-weight: 700; color: var(--text);
    margin: 0; line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-info p {
    font-size: .78rem; color: var(--text-sec); margin: 4px 0 0 0; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .item-action {
    display: flex; flex-direction: column; justify-content: space-between;
    align-items: flex-end; flex-shrink: 0; width: 104px;
  }
  .item-price {
    font-weight: 800; font-size: .88rem; color: var(--text);
    white-space: nowrap; margin-bottom: auto;
  }

  /* ── Quantity Controls (44px green circles) ── */
  .qty-ctrl { display: flex; align-items: center; gap: 10px; margin-top: auto; }
  .qty-ctrl button {
    width: var(--touch); height: var(--touch);
    border-radius: 50%; border: none;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 1.15rem; cursor: pointer;
    background-color: var(--pri); color: #fff;
    transition: all var(--tran); font-family: inherit;
    box-shadow: 0 3px 10px rgba(22,163,74,.25);
  }
  .qty-ctrl button:hover { background-color: var(--pri-dark); box-shadow: 0 5px 14px rgba(22,163,74,.35); }
  .qty-ctrl button:active { transform: scale(.88); }
  .qty-ctrl span { font-weight: 700; font-size: .95rem; color: var(--text); min-width: 16px; text-align: center; }

  /* ── Sold-Out State ── */
  .item-sold-out { opacity: .45 !important; }
  .sold-out-badge {
    background-color: #e5e7eb; color: #6b7280;
    font-size: .75rem; font-weight: 700;
    padding: 6px 12px; border-radius: var(--r-sm);
    display: inline-block; user-select: none;
    cursor: not-allowed; border: 1px solid var(--border);
  }

  /* ── Cart Bar (fixed bottom, glass) ── */
  .cart-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background-color: var(--card);
    border-top: 1px solid var(--border);
    box-shadow: 0 -4px 16px rgba(0,0,0,.04);
    padding: 16px 20px calc(16px + var(--safe-bot)) 20px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 30; border-radius: var(--r-xl) var(--r-xl) 0 0;
  }
  .cart-bar--bounce { animation: cartBounce 300ms ease; }
  @keyframes cartBounce {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50%      { transform: translateX(-50%) scale(1.03); }
  }
  .cart-info { display: flex; flex-direction: column; gap: 2px; text-align: left; }
  #cart-count { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .cart-total { font-size: 1.35rem; font-weight: 850; color: var(--pri-dark); }

  .order-btn {
    background-color: var(--pri); color: #fff; border: none;
    padding: 10px 24px; border-radius: var(--r-lg); cursor: pointer;
    transition: all var(--tran-slow);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-width: 156px; font-family: inherit;
    box-shadow: 0 4px 14px rgba(22,163,74,.28);
  }
  .order-btn:hover:not(:disabled) { background-color: var(--pri-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(22,163,74,.35); }
  .order-btn:active:not(:disabled) { transform: scale(.97); }
  .order-btn:disabled { opacity: .35 !important; cursor: not-allowed; transform: none !important; box-shadow: none; }
  .order-btn:disabled:hover { background-color: var(--pri); transform: none; }

  .cart-btn-main { font-weight: 800; font-size: .92rem; line-height: 1.25; }
  .cart-btn-sub { font-size: .72rem; font-weight: 500; opacity: .85; line-height: 1.25; }

  /* ── Checkout Modal (bottom sheet) ── */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background-color: rgba(0,0,0,.45);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    z-index: 100; display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn .15s ease;
  }
  .modal {
    background: var(--card); width: 100%; max-width: 480px;
    border-radius: var(--r-2xl) var(--r-2xl) 0 0;
    box-shadow: 0 -8px 40px rgba(0,0,0,.12);
    padding: 24px 20px calc(24px + var(--safe-bot)) 20px;
    max-height: 90vh; overflow-y: auto;
    animation: slideUp .35s cubic-bezier(.16,1,.3,1);
    display: flex; flex-direction: column; gap: 16px;
  }
  .modal::before {
    content: ""; display: block; width: 40px; height: 4px;
    background-color: #e5e7eb; border-radius: 2px;
    margin: 0 auto 6px auto;
  }
  #checkout-title { font-size: 1.35rem; font-weight: 700; color: var(--text); margin: 0; text-align: center; }

  /* ── Dining Toggle & Payment Methods ── */
  .dining-toggle, .pay-methods { display: flex; gap: 10px; width: 100%; }
  .dining-toggle button, .pay-methods button {
    flex: 1; background-color: #f9f9f9;
    border: 1.5px solid var(--border); border-radius: var(--r-lg);
    padding: 12px; font-size: .88rem; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all var(--tran); font-family: inherit; color: var(--text-sec);
  }
  .dining-toggle button.active, .pay-methods button.active {
    border-color: var(--pri); background-color: var(--pri-bg); color: var(--pri-dark);
    box-shadow: inset 0 0 0 1px var(--pri);
  }

  /* ── Order Summary ── */
  .order-summary {
    background-color: #fcfbfa; border: 1px dashed var(--border);
    border-radius: var(--r-lg); padding: 16px;
    display: flex; flex-direction: column; gap: 10px; font-size: .85rem;
  }
  .order-summary .line { display: flex; justify-content: space-between; color: var(--text-sec); }
  .order-summary .line--total {
    display: flex; justify-content: space-between; font-weight: 800;
    color: var(--pri-dark); font-size: 1rem; margin-top: 10px; padding-top: 10px;
    border-top: 1px dashed var(--border);
  }

  /* ── Bank Instructions ── */
  .bank-instructions {
    background: var(--pri-bg); border-left: 3px solid var(--pri);
    border-radius: var(--r-lg); padding: 12px 14px;
    font-size: .82rem; color: var(--pri-dark); line-height: 1.4; text-align: left;
  }
  .bank-instructions strong { display: block; margin-bottom: 4px; font-size: .85rem; }

  /* ── Modal Inputs ── */
  .modal input[type="text"],
  .modal input[type="tel"],
  .modal textarea {
    background-color: #f9f9f9; border: 1.5px solid var(--border);
    border-radius: var(--r-lg); padding: 12px 16px;
    font-size: .88rem; color: var(--text); outline: none;
    font-family: inherit; width: 100%; box-sizing: border-box;
    transition: all var(--tran);
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--pri); background-color: #fff; }
  .modal textarea { resize: none; height: 64px; }

  /* ── Validation Error ── */
  @keyframes shakeInput {
    0%, 100% { transform: translateX(0); }
    15%, 45%, 75% { transform: translateX(-6px); }
    30%, 60%, 90% { transform: translateX(6px); }
  }
  .input-error { border: 1.5px solid #ef4444 !important; animation: shakeInput .4s ease-in-out; background-color: #fef2f2 !important; }

  /* ── Pickup Times ── */
  .pickup-time { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; width: 100%; }
  .pickup-time::-webkit-scrollbar { display: none; }
  .pickup-time button {
    background-color: #f3f4f6; border: none; border-radius: var(--r);
    padding: 8px 12px; font-size: .8rem; font-weight: 600;
    color: var(--text-sec); cursor: pointer; white-space: nowrap;
    transition: all var(--tran); font-family: inherit;
  }
  .pickup-time button.active { background-color: var(--pri); color: #fff; }

  /* ── Note Field ── */
  #cust-note { background: #fefce8; border: 1px solid #fde68a; border-radius: var(--r-lg); color: #78350f; }
  #cust-note:focus { background: #fefcbd; border-color: #f59e0b; }

  /* ── Consent ── */
  .consent-label {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: .78rem; color: var(--text-sec); cursor: pointer;
    text-align: left; margin: 4px 0;
  }
  .consent-label input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--pri); margin-top: 1px; cursor: pointer; }
  .consent-label a { color: var(--pri); text-decoration: underline; font-weight: 600; }

  /* ── Modal Buttons ── */
  .submit-btn, .cancel-btn {
    border: none; border-radius: var(--r-lg);
    font-size: .95rem; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    width: 100%; font-family: inherit; transition: all var(--tran);
  }
  .submit-btn {
    background-color: var(--pri); color: #fff;
    min-height: var(--touch);
    box-shadow: 0 4px 14px rgba(22,163,74,.25);
  }
  .submit-btn:hover:not(:disabled) { background-color: var(--pri-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(22,163,74,.35); }
  .submit-btn:active:not(:disabled) { transform: scale(.97); }
  .submit-btn:disabled { opacity: .35; cursor: not-allowed; box-shadow: none; }
  .submit-btn:disabled:hover { background-color: var(--pri); transform: none; }
  .cancel-btn {
    background-color: #f3f4f6; color: var(--text-sec);
    min-height: var(--touch-sm); margin-top: 0;
  }
  .cancel-btn:hover { background-color: #e5e7eb; }

  /* ── Success View ── */
  #success-view {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 32px 16px; text-align: center;
    background-color: #faf6eb;
    background-image: radial-gradient(#ebdcb9 1.2px, transparent 1.2px);
    background-size: 16px 16px;
    min-height: 100vh;
    animation: fadeIn .3s ease;
  }
  .success {
    background-color: var(--card); border-radius: var(--r-2xl);
    padding: 40px 24px; box-shadow: var(--shadow-card);
    border: 1px solid rgba(0,0,0,.03);
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    width: 100%; max-width: 440px;
    animation: successCardPop .4s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes successCardPop {
    from { transform: scale(.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .success .icon { font-size: 5rem; margin-bottom: 8px; display: inline-block; animation: successBounce .6s cubic-bezier(.175,.885,.32,1.275) both; }
  @keyframes successBounce {
    0%   { transform: scale(0); }
    60%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .success h2 { color: var(--pri-dark); font-weight: 800; font-size: 1.5rem; margin: 0; }
  .success p { font-size: .95rem; color: var(--text-sec); line-height: 1.5; margin: 0; }
  .dining-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background-color: var(--pri-bg); color: var(--pri-dark);
    padding: 6px 14px; border-radius: var(--r-xl);
    font-size: .82rem; font-weight: 700; margin: 2px 0;
  }

  /* ── Success Actions (加单 + 完成 buttons) ── */
  .success-actions { display: flex; gap: 12px; width: 100%; margin-top: 16px; }
  .btn-append {
    flex: 1; background: transparent; color: var(--pri);
    border: 2px solid var(--pri); border-radius: var(--r-lg);
    padding: 12px 16px; font-size: .95rem; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: 6px; transition: all var(--tran); font-family: inherit; min-height: var(--touch);
  }
  .btn-append:hover { background-color: var(--pri-bg); border-color: var(--pri-dark); color: var(--pri-dark); }
  .btn-append:active { transform: scale(.96); }
  .btn-done {
    flex: 1; background: var(--pri); color: #fff; border: none;
    border-radius: var(--r-lg); padding: 12px 16px;
    font-size: .95rem; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 6px; transition: all var(--tran); font-family: inherit;
    min-height: var(--touch);
    box-shadow: 0 4px 12px rgba(22,163,74,.2);
  }
  .btn-done:hover { background-color: var(--pri-dark); }
  .btn-done:active { transform: scale(.96); }
  .success-countdown { font-size: .8rem; color: var(--muted); margin-top: 10px; font-weight: 500; }

  /* ── Footer ── */
  .order-footer { text-align: center; padding: 32px 16px 48px 16px; font-size: .75rem; color: var(--muted); display: flex; align-items: center; justify-content: center; gap: 8px; }
  .order-footer a { color: var(--muted); text-decoration: none; transition: color .15s ease; }
  .order-footer a:hover { color: var(--pri); }

  /* ── Skeleton (pre-JS loading) ── */
  .skeleton-item {
    display: flex; gap: 12px; padding: 14px; margin: 10px 16px;
    background: var(--card); border-radius: var(--r-lg); align-items: center;
    border: 1px solid rgba(0,0,0,.03);
    box-shadow: 0 2px 8px rgba(0,0,0,.02);
  }
  .skel-img {
    width: 72px; height: 72px; border-radius: var(--r); flex-shrink: 0;
    background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite;
  }
  .skel-body { flex: 1; min-width: 0; }
  .skel-line {
    height: 13px; border-radius: 7px; margin-bottom: 8px;
    background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite;
  }
  .skel-line--w { width: 65%; }
  .skel-line--n { width: 42%; }
  .skel-line--p { width: 44px; height: 16px; }
  .skel-qty { display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }
  .skel-circle {
    width: var(--touch); height: var(--touch); border-radius: 50%;
    background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── Utilities ── */
  .hidden { display: none !important; }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }

let shopId, shop, categories=[], items=[], cart={}, lang=localStorage.getItem('suriorder_lang')||'nl', pickupTime='Nu', paymentMethod='cod', diningOption='takeaway', activeCat=0, successCountdownTimer=null, activeOrderId=null;

function bindEvents() {
  // Language switch
  document.getElementById('lang-switch').addEventListener('click', function(e) {
    var btn = e.target.closest('button');
    if (!btn || !btn.dataset.lang) return;
    setLang(btn.dataset.lang);
  });

  // Cart button
  document.getElementById('cart-btn').addEventListener('click', showCheckout);

  // Dining option toggle
  document.getElementById('dining-toggle').addEventListener('click', function(e) {
    var btn = e.target.closest('button');
    if (!btn || !btn.dataset.dining) return;
    setDining(btn.dataset.dining);
  });

  // Payment methods
  document.getElementById('pay-methods').addEventListener('click', function(e) {
    var btn = e.target.closest('button');
    if (!btn || !btn.dataset.pay) return;
    setPayment(btn.dataset.pay);
  });

  // Pickup times
  document.getElementById('pickup-times').addEventListener('click', function(e) {
    var btn = e.target.closest('button');
    if (!btn || !btn.dataset.time) return;
    setPickup(btn.dataset.time, btn);
  });

  // Submit and cancel
  document.getElementById('submit-btn').addEventListener('click', submitOrder);
  document.getElementById('cancel-btn').addEventListener('click', hideCheckout);

  // Consent checkbox
  document.getElementById('consent-check').addEventListener('change', updateConsent);

  // Category nav delegation
  document.getElementById('cat-nav').addEventListener('click', function(e) {
    var btn = e.target.closest('button');
    if (!btn || btn.dataset.catId === undefined) return;
    filterCat(parseInt(btn.dataset.catId));
  });

  // Menu item actions delegation (qty buttons)
  document.getElementById('menu').addEventListener('click', function(e) {
    var btn = e.target.closest('button');
    if (!btn || !btn.dataset.itemId) return;
    changeQty(parseInt(btn.dataset.itemId), parseInt(btn.dataset.delta));
  });

  // Success view delegation (append + done buttons)
  document.getElementById('success-view').addEventListener('click', function(e) {
    if (e.target.closest('#btn-append')) startAppend();
    if (e.target.closest('#btn-done')) location.reload();
  });
}

async function init(){
  bindEvents();
  var p = window.location.pathname.split('/');
  shopId = p[p.length-1] || 'demo';
  try {
    var r = await fetch('/api/shop/' + shopId);
    if(!r.ok){ document.getElementById('shop-name').textContent='Shop not found'; document.getElementById('menu').innerHTML=''; return; }
    var d = await r.json();
    shop = d.shop; categories = d.categories; items = d.items;
    lang = shop.language || 'nl';
    var menuUrl = location.origin + '/order/' + shopId;
    document.getElementById('og-title').setAttribute('content', shop.name);
    document.getElementById('og-desc').setAttribute('content', t('shop_desc'));
    document.getElementById('og-url').setAttribute('content', menuUrl);
    document.title = shop.name + ' — Bestellen';
    if (shop.whatsapp_number) {
      var waBtn = document.getElementById('wa-contact');
      waBtn.href = 'https://wa.me/' + shop.whatsapp_number.replace(/[^0-9]/g, '');
      waBtn.style.display = '';
    }
    setLang(lang);
    renderAll();
  } catch (_) {
    document.getElementById('menu').innerHTML = '<p style="text-align:center;color:var(--text-sec);padding:60px">Failed to load menu. Please refresh.</p>';
  }
}

function t(key){ return L[lang]?.[key] || L.nl[key] || key; }
function tn(obj){ return obj?.['name_'+lang] || obj?.name || ''; }
function td(obj){ return obj?.['desc_'+lang] || obj?.desc || ''; }
function fmtPrice(n){ return 'SRD '+Number(n).toFixed(2); }

function setLang(l){
  lang=l;
  localStorage.setItem('suriorder_lang', l);
  document.querySelectorAll('.lang-switch button').forEach(function(b){ b.classList.toggle('active',b.id==='btn-'+l); });
  document.getElementById('consent-text').innerHTML = t('consent_text');
  document.getElementById('footer-privacy').textContent = t('footer_privacy');
  document.getElementById('footer-tos').textContent = t('footer_tos');
  document.getElementById('footer-brand').textContent = t('footer');
  document.getElementById('dining-dine_in').textContent = t('dine_in');
  document.getElementById('dining-takeaway').textContent = t('takeaway');
  renderAll();
}

function renderAll(){
  var catEmojiMap = {};
  var emojis = ['🍚','🍜','🍲','🥤','🍖','🥗','🍰','🧋'];
  categories.forEach(function(c,i){ catEmojiMap[c.id] = emojis[i % emojis.length]; });
  document.getElementById('shop-name').textContent = tn(shop) || shop.name;
  document.getElementById('shop-desc').textContent = t('shop_desc');
  var cn = document.getElementById('cat-nav');
  cn.innerHTML = '<button class="active" data-cat-id="0">' + t('all') + '</button>' + categories.map(function(c){ return '<button data-cat-id="'+c.id+'" aria-label="'+t('filter').replace('{cat}', esc(tn(c)||c.name))+'">'+esc(tn(c)||c.name)+'</button>'; }).join('');
  filterCat(0);
  updateCart();
}

function filterCat(cid){
  activeCat=cid;
  document.querySelectorAll('.cat-nav button').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.cat-nav button').forEach(function(b){ var catId=parseInt(b.dataset.catId); if(catId===cid||(cid===0&&!catId)) b.classList.add('active'); });
  var menu = document.getElementById('menu');
  var html='', lastCat=null;
  var filtered = cid===0 ? items : items.filter(function(i){ return i.category_id===cid; });
  filtered.forEach(function(i){
    if(cid===0 && i.category_id!==lastCat){
      var cat = categories.find(function(c){ return c.id===i.category_id; });
      if(cat) html+='<div class="cat-title">'+esc(tn(cat)||cat.name)+'</div>';
      lastCat = i.category_id;
    }
    var q = cart[i.id]||0;
    var soldOut = i.available === 0;
    html+='<div class="item'+(soldOut ? ' item-sold-out' : '')+'"'+(i.category_id ? ' data-cat="'+i.category_id+'"' : '')+'>'+
      '<div class="item-img">'+(i.image_url?'<img src="'+esc(i.image_url)+'" alt="">':(catEmojiMap[i.category_id]||'🍽️'))+'</div>'+
      '<div class="item-info"><h3>'+esc(tn(i)||i.name)+'</h3><p>'+esc(td(i))+'</p></div>'+
      '<div class="item-action"><div class="item-price">'+fmtPrice(i.price)+'</div>'+
      (soldOut ? '<span class="sold-out-badge">'+t('sold_out')+'</span>' : '<div class="qty-ctrl"><button data-item-id="'+i.id+'" data-delta="-1" aria-label="'+t('remove_one').replace('{item}', esc(tn(i)||i.name))+'">−</button><span>'+q+'</span><button data-item-id="'+i.id+'" data-delta="1" aria-label="'+t('add_one').replace('{item}', esc(tn(i)||i.name))+'">+</button></div>')+'</div></div>';
  });
  if(!filtered.length) html='<p style="text-align:center;color:var(--muted);padding:40px">'+t('empty_menu')+'</p>';
  menu.innerHTML = html;
}

function changeQty(id,d){
  var item = items.find(function(i){ return i.id===id; });
  if (item && item.available === 0) return;
  if(!cart[id]) cart[id]=0;
  cart[id]+=d;
  if(cart[id]<=0) delete cart[id];
  filterCat(activeCat);
  updateCart();
  // Cart bounce animation
  var bar = document.getElementById('cart-bar');
  bar.classList.remove('cart-bar--bounce');
  void bar.offsetWidth;
  bar.classList.add('cart-bar--bounce');
}

function updateCart(){
  var count=0,total=0;
  Object.entries(cart).forEach(function(e){
    var item=items.find(function(i){ return i.id===parseInt(e[0]); });
    if(item){ count+=e[1]; total+=item.price*e[1]; }
  });
  document.getElementById('cart-count').textContent = count + ' items';
  document.getElementById('cart-total').textContent = fmtPrice(total);
  var mainEl = document.querySelector('.cart-btn-main');
  var subEl = document.querySelector('.cart-btn-sub');
  if (activeOrderId) {
    if (count > 0) {
      mainEl.textContent = (count + ' items · ' + fmtPrice(total));
      subEl.textContent = t('append_to') + activeOrderId;
    } else {
      mainEl.textContent = t('append_to') + activeOrderId;
      subEl.textContent = t('append_cart_hint');
    }
    document.getElementById('cart-btn').disabled = count===0;
  } else {
    if (count > 0) {
      mainEl.textContent = (count + ' items · ' + fmtPrice(total));
      subEl.textContent = t('cart_view');
    } else {
      mainEl.textContent = t('order_btn');
      subEl.textContent = t('cart_empty_sub');
    }
    document.getElementById('cart-btn').disabled = count===0;
  }
}

function showCheckout(){
  if(!Object.keys(cart).length) return;
  document.getElementById('checkout-modal').classList.remove('hidden');
  if (activeOrderId) {
    document.getElementById('checkout-title').textContent = t('checkout_title_append') + ' #' + activeOrderId;
    document.getElementById('cust-name').style.display = 'none';
    document.getElementById('cust-phone').style.display = 'none';
    document.getElementById('consent-label').style.display = 'none';
    document.getElementById('submit-btn').textContent = t('submit_append');
    document.getElementById('submit-btn').disabled = false;
  } else {
    document.getElementById('checkout-title').textContent = t('checkout_title');
    document.getElementById('cust-name').style.display = '';
    document.getElementById('cust-phone').style.display = '';
    document.getElementById('consent-label').style.display = '';
    document.getElementById('submit-btn').textContent = t('submit');
  }
  document.getElementById('cust-name').placeholder = t('name_ph');
  document.getElementById('cust-phone').placeholder = t('phone_ph');
  document.getElementById('cust-note').placeholder = t('note_ph');
  document.getElementById('pay-cod').textContent = t('pay_cod');
  document.getElementById('pay-bank_transfer').textContent = t('pay_bank');
  document.getElementById('bank-title').textContent = t('bank_title');
  var summary='',total=0;
  Object.entries(cart).forEach(function(e){
    var item=items.find(function(i){ return i.id===parseInt(e[0]); });
    if(item){ summary+='<div class="line"><span>'+e[1]+'x '+esc(tn(item)||item.name)+'</span><span>'+fmtPrice(item.price*e[1])+'</span></div>'; total+=item.price*e[1]; }
  });
  summary+='<div class="line line--total"><span>'+t('total')+'</span><span>'+fmtPrice(total)+'</span></div>';
  document.getElementById('order-summary').innerHTML = summary;
  document.getElementById('dining-dine_in').textContent = t('dine_in');
  document.getElementById('dining-takeaway').textContent = t('takeaway');
  setDining(diningOption);
  setPayment(paymentMethod);
  document.getElementById('consent-text').innerHTML = t('consent_text');
  document.getElementById('consent-check').checked = false;
  updateConsent();
}

function hideCheckout(){ document.getElementById('checkout-modal').classList.add('hidden'); }

function updateConsent(){
  document.getElementById('submit-btn').disabled = !document.getElementById('consent-check').checked;
}

function setPickup(val,btn){
  pickupTime=val;
  document.querySelectorAll('.pickup-time button').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}

function setDining(val){
  diningOption = val;
  document.querySelectorAll('.dining-toggle button').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('dining-'+val).classList.add('active');
  var pt = document.getElementById('pickup-times');
  if (val === 'dine_in') {
    pt.style.display = 'none';
  } else {
    pt.style.display = '';
    pickupTime = 'Nu';
    document.querySelectorAll('.pickup-time button').forEach(function(b){ b.classList.remove('active'); });
    var nuBtn = document.querySelector('.pickup-time button[data-time="Nu"]');
    if (nuBtn) nuBtn.classList.add('active');
  }
}

function setPayment(m){
  paymentMethod=m;
  document.querySelectorAll('.pay-methods button').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('pay-'+m).classList.add('active');
  if (m==='bank_transfer') {
    document.getElementById('bank-info').classList.remove('hidden');
    var bnk = shop.bank_name ? shop.bank_name+' — '+((shop.bank_account||''))+' ('+(shop.bank_account_name||'')+')' : t('bank_details')+'[configureer in admin]';
    document.getElementById('bank-details').textContent = t('bank_details') + bnk;
  } else {
    document.getElementById('bank-info').classList.add('hidden');
  }
}

async function submitOrder(){
  var isAppend = !!activeOrderId;
  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '...';

  var name, phone;
  if (!isAppend) {
    name = document.getElementById('cust-name').value.trim();
    phone = document.getElementById('cust-phone').value.trim();
    if(!name) { btn.disabled = false; btn.textContent = t('submit'); return Toast.warn(t('alert_name')); }
    if (name.length < 2) { btn.disabled = false; btn.textContent = t('submit'); return Toast.warn(t('alert_name_short')); }
    if(!phone) { btn.disabled = false; btn.textContent = t('submit'); return Toast.warn(t('alert_phone')); }
    if(!/^\+?597\d{6,7}$/.test(phone)) { btn.disabled = false; btn.textContent = t('submit'); return Toast.error(t('alert_phone_format')); }
    if(!document.getElementById('consent-check').checked) { btn.disabled = false; btn.textContent = t('submit'); return Toast.warn(t('alert_consent')); }
  }

  try {
  var items_arr = Object.entries(cart).map(function(e){ return {id:parseInt(e[0]), qty:e[1]}; });
  var url, method, body;
  if (isAppend) {
    url = '/api/order/' + activeOrderId + '/append';
    method = 'PUT';
    body = JSON.stringify({items:items_arr, note:document.getElementById('cust-note').value.trim()});
  } else {
    url = '/api/order';
    method = 'POST';
    body = JSON.stringify({shop_id:shopId,customer_name:name,customer_phone:phone,items:items_arr,note:document.getElementById('cust-note').value.trim(),pickup_time:pickupTime,payment_method:paymentMethod,dining_option:diningOption});
  }
  var r = await fetch(url,{method:method,headers:{'Content-Type':'application/json'},body:body});
  if(!r.ok){ var errData = await r.json().catch(function(){return {};}); btn.disabled = false; btn.textContent = isAppend ? t('submit_append') : t('submit'); Toast.error(errData.error || t('alert_order_error')); return; }
  var order=await r.json();
  document.getElementById('checkout-modal').classList.add('hidden');
  showSuccess(order);
  cart={};updateCart();
  } catch(_) {
    btn.disabled = false; btn.textContent = isAppend ? t('submit_append') : t('submit');
    Toast.error(t('alert_order_error'));
  }
}

function showSuccess(order){
  document.getElementById('cat-nav').classList.add('hidden');
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('cart-bar').classList.add('hidden');
  var sv = document.getElementById('success-view');
  sv.classList.remove('hidden');
  var diningLabel = diningOption === 'dine_in' ? t('dine_in') : t('takeaway');
  sv.innerHTML = '<div class="success">' +
    '<div class="icon">✅</div>' +
    '<h2>'+t('success_title')+'</h2>' +
    '<p>'+t('success_msg')+'</p>' +
    '<p style="font-weight:700;margin-top:8px">'+t('order_id')+': #'+esc(order.order_id)+'</p>' +
    '<p>'+t('total')+': '+fmtPrice(order.total)+'</p>' +
    '<div class="dining-badge">'+diningLabel+'</div>' +
    '<div class="success-actions">' +
      '<button class="btn-append" id="btn-append">'+t('success_append_btn')+'</button>' +
      '<button class="btn-done" id="btn-done">'+t('success_done_btn')+'</button>' +
    '</div>' +
    '<div class="success-countdown" id="success-countdown"></div>' +
  '</div>';
  // Countdown timer
  var sec = 8;
  var cdEl = document.getElementById('success-countdown');
  cdEl.textContent = sec + t('success_countdown');
  if (successCountdownTimer) clearInterval(successCountdownTimer);
  successCountdownTimer = setInterval(function(){
    sec--;
    if (sec <= 0) { clearInterval(successCountdownTimer); successCountdownTimer = null; location.reload(); }
    else { cdEl.textContent = sec + t('success_countdown'); }
  }, 1000);
}

function startAppend(){
  if (successCountdownTimer) { clearInterval(successCountdownTimer); successCountdownTimer = null; }
  document.getElementById('success-view').classList.add('hidden');
  document.getElementById('cat-nav').classList.remove('hidden');
  document.getElementById('menu').classList.remove('hidden');
  document.getElementById('cart-bar').classList.remove('hidden');
  updateCart();
}

init();
</script>
</body>
</html>
