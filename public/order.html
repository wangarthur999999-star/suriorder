<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Bestellen</title>
<meta property="og:title" content="" id="og-title">
<meta property="og:description" content="" id="og-desc">
<meta property="og:url" content="" id="og-url">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%2316a34a'/><text x='16' y='24' text-anchor='middle' font-size='18'>🍽️</text></svg>">
<link rel="stylesheet" href="/shared.css">
<style>
  body { max-width: 480px; margin: 0 auto; }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, var(--pri), var(--pri-dark));
    color: #fff; padding: calc(20px + var(--safe-top)) 16px 16px;
    text-align: center; position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
  header p { font-size: .85rem; opacity: .9; }

  /* ── Language Switch ── */
  .lang-switch { position: absolute; top: calc(18px + var(--safe-top)); right: 14px; display: flex; gap: 3px; background: rgba(255,255,255,.2); border-radius: var(--r); padding: 2px; }
  .lang-switch button {
    background: transparent; border: none; color: rgba(255,255,255,.7);
    padding: 6px 10px; border-radius: var(--r-sm); font-size: .78rem; cursor: pointer;
    font-weight: 500; transition: all var(--tran); min-height: var(--touch-sm);
  }
  .lang-switch button.active { background: #fff; color: var(--pri); font-weight: 700; }

  /* ── WhatsApp Contact ── */
  .wa-contact {
    position: absolute; top: calc(16px + var(--safe-top)); left: 14px;
    background: #25D366; color: #fff; padding: 6px 12px; border-radius: var(--r);
    font-size: .78rem; text-decoration: none; font-weight: 600;
    min-height: var(--touch-sm); display: none; transition: background var(--tran);
  }
  .wa-contact:hover { background: #1fa954; }

  /* ── Category Nav ── */
  .cat-nav {
    display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto;
    background: var(--card); border-bottom: 1px solid var(--border);
    scrollbar-width: none; -ms-overflow-style: none;
  }
  .cat-nav::-webkit-scrollbar { display: none; }
  .cat-nav button {
    white-space: nowrap; padding: 8px 16px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--card);
    font-size: .85rem; font-weight: 500; cursor: pointer;
    min-height: var(--touch-sm); transition: all var(--tran);
  }
  .cat-nav button:hover { border-color: var(--pri); color: var(--pri); }
  .cat-nav button.active { background: var(--pri); color: #fff; border-color: var(--pri); }

  /* ── Menu Items ── */
  .menu { padding: 12px 16px; }
  .cat-title { font-size: .85rem; font-weight: 700; margin: 16px 0 8px; color: var(--text-sec); text-transform: uppercase; letter-spacing: .5px; }
  .item {
    display: flex; gap: 12px; padding: 12px; background: var(--card);
    border-radius: var(--r-lg); margin-bottom: 8px; align-items: center;
    box-shadow: var(--shadow); transition: transform var(--tran), box-shadow var(--tran);
  }
  .item:active { transform: scale(.99); }
  .item-img {
    width: 56px; height: 56px; border-radius: var(--r); background: var(--bg);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; overflow: hidden;
  }
  .item-img img { width: 100%; height: 100%; object-fit: cover; }
  .item-info { flex: 1; min-width: 0; }
  .item-info h3 { font-size: .92rem; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-info p { font-size: .78rem; color: var(--text-sec); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .item-action { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
  .item-price { font-weight: 700; font-size: .95rem; color: var(--pri); }

  /* ── Quantity Controls ── */
  .qty-ctrl { display: flex; align-items: center; gap: 10px; }
  .qty-ctrl button {
    width: var(--touch); height: var(--touch); min-width: var(--touch); min-height: var(--touch);
    border-radius: 50%; border: 2px solid var(--pri); background: var(--card);
    color: var(--pri); font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--tran); font-weight: 600;
  }
  .qty-ctrl button:hover { background: var(--pri-light); }
  .qty-ctrl button:active { background: var(--pri); color: #fff; transform: scale(.9); }
  .qty-ctrl span { font-weight: 700; min-width: 24px; text-align: center; font-size: .95rem; }

  /* ── Cart Bar ── */
  .cart-bar {
    position: sticky; bottom: 0; background: var(--card);
    padding: 14px 16px; padding-bottom: calc(14px + var(--safe-bot));
    border-top: 1px solid var(--border); display: flex;
    justify-content: space-between; align-items: center;
    box-shadow: 0 -2px 12px rgba(0,0,0,.08);
  }
  .cart-bar--bounce { animation: cartBounce 300ms ease; }
  @keyframes cartBounce {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }
  .cart-info { font-size: .85rem; }
  .cart-info .label { color: var(--text-sec); }
  .cart-total { font-weight: 700; font-size: 1.15rem; color: var(--pri); }
  .cart-bar .order-btn {
    background: var(--pri); color: #fff; border: none;
    padding: 12px 24px; border-radius: var(--r-lg); font-weight: 700;
    font-size: .95rem; cursor: pointer; min-height: var(--touch);
    transition: all var(--tran);
  }
  .cart-bar .order-btn:hover { background: var(--pri-dark); }
  .cart-bar .order-btn:disabled { opacity: .4; cursor: default; }
  .cart-bar .order-btn:disabled:hover { background: var(--pri); }

  /* ── Checkout Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 100; display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn 150ms ease;
  }
  .modal {
    background: var(--card); width: 100%; max-width: 480px;
    border-radius: var(--r-2xl) var(--r-2xl) 0 0; padding: 24px 16px;
    padding-bottom: calc(24px + var(--safe-bot));
    max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg);
  }
  .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; text-align: center; }
  .modal input, .modal textarea, .modal select {
    width: 100%; padding: 12px; border: 2px solid var(--border);
    border-radius: var(--r); margin-bottom: 12px; font-size: .9rem;
    min-height: var(--touch); outline: none; transition: border-color var(--tran);
    background: var(--bg); font-family: inherit;
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--pri); }
  .modal textarea { resize: none; height: 60px; }

  /* ── Pickup Times ── */
  .pickup-time { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .pickup-time button {
    padding: 8px 12px; border: 1.5px solid var(--border); border-radius: var(--r);
    background: var(--card); font-size: .8rem; cursor: pointer;
    min-height: var(--touch-sm); transition: all var(--tran);
  }
  .pickup-time button:hover { border-color: var(--pri); }
  .pickup-time button.active { background: var(--pri); color: #fff; border-color: var(--pri); }

  /* ── Payment Methods ── */
  .pay-methods { display: flex; gap: 8px; margin-bottom: 12px; }
  .pay-methods button {
    flex: 1; padding: 10px; border: 2px solid var(--border);
    border-radius: var(--r); background: var(--card); font-size: .82rem;
    cursor: pointer; min-height: var(--touch-sm); transition: all var(--tran);
  }
  .pay-methods button:hover { border-color: var(--pri); }
  .pay-methods button.active { border-color: var(--pri); background: var(--pri-bg); font-weight: 600; }

  /* ── Bank Instructions ── */
  .bank-instructions {
    background: var(--pri-bg); padding: 12px; border-radius: var(--r);
    margin-bottom: 12px; font-size: .8rem; line-height: 1.4;
    border: 1px solid var(--pri-light);
  }
  .bank-instructions strong { display: block; margin-bottom: 4px; }

  /* ── Order Summary ── */
  .order-summary {
    background: var(--bg); border-radius: var(--r); padding: 12px; margin-bottom: 12px;
  }
  .order-summary .line { display: flex; justify-content: space-between; font-size: .85rem; margin-bottom: 4px; line-height: 1.5; }
  .order-summary .line--total { font-weight: 700; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

  /* ── Buttons in Modal ── */
  .submit-btn {
    width: 100%; padding: 14px; background: var(--pri); color: #fff;
    border: none; border-radius: var(--r-lg); font-weight: 700; font-size: 1rem;
    cursor: pointer; min-height: var(--touch); transition: background var(--tran);
  }
  .submit-btn:hover { background: var(--pri-dark); }
  .cancel-btn {
    width: 100%; padding: 12px; margin-top: 8px; background: var(--bg);
    border: none; border-radius: var(--r-lg); font-size: .9rem; cursor: pointer;
    min-height: var(--touch-sm); transition: background var(--tran); color: var(--text-sec);
  }
  .cancel-btn:hover { background: var(--border); }

  /* ── Consent Checkbox ── */
  .consent-label { display: flex; align-items: flex-start; gap: 8px; font-size: .8rem; color: var(--text-sec); margin-bottom: 12px; line-height: 1.4; cursor: pointer; }
  .consent-label input { width: auto; margin-top: 2px; min-height: auto; accent-color: var(--pri); }
  .consent-label a { color: var(--pri); text-decoration: underline; }

  /* ── Footer ── */
  .order-footer { text-align: center; padding: 16px 16px 24px; color: var(--muted); font-size: .75rem; }
  .order-footer a { color: var(--muted); text-decoration: none; }
  .order-footer a:hover { color: var(--pri); }

  /* ── Success View ── */
  .success { text-align: center; padding: 48px 16px; }
  .success .icon { font-size: 4rem; margin-bottom: 16px; }
  .success h2 { color: var(--pri); font-weight: 700; margin-bottom: 8px; }
  .success p { color: var(--text-sec); margin-bottom: 4px; font-size: .9rem; }
  .share-btn {
    display: inline-block; margin-top: 12px; padding: 12px 24px;
    background: #25D366; color: #fff; border-radius: 24px; text-decoration: none;
    font-weight: 600; font-size: .9rem; transition: background var(--tran);
  }
  .share-btn:hover { background: #1fa954; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<a href="#menu" class="skip-link">Skip to menu</a>

<header>
  <div class="lang-switch" id="lang-switch" role="group" aria-label="Select language">
    <button class="active" data-lang="nl" id="btn-nl">NL</button>
    <button data-lang="zh" id="btn-zh">中文</button>
    <button data-lang="en" id="btn-en">EN</button>
    <button data-lang="es" id="btn-es">ES</button>
  </div>
  <h1 id="shop-name">...</h1>
  <p id="shop-desc">Gerechten bestellen</p>
  <a class="wa-contact" id="wa-contact" href="#" target="_blank" rel="noopener">💬 WhatsApp</a>
</header>

<nav class="cat-nav" id="cat-nav"></nav>
<main class="menu" id="menu"></main>

<div class="cart-bar" id="cart-bar">
  <div class="cart-info">
    <span class="label" id="cart-count">0 items</span><br>
    <span class="cart-total" id="cart-total">SRD 0</span>
  </div>

</div>

<div class="modal-overlay hidden" id="checkout-modal">
  <div class="modal">
    <h2 id="checkout-title">Uw bestelling</h2>
    <div class="order-summary" id="order-summary"></div>
    <div class="pay-methods" id="pay-methods" role="group" aria-label="Select payment method">
      <button class="active" data-pay="cod" id="pay-cod">💵 Contant</button>
      <button data-pay="bank_transfer" id="pay-bank_transfer">🏦 Overschrijving</button>
    </div>

      <strong id="bank-title">Bank Transfer</strong>
      <p id="bank-details"></p>
    </div>
    <input type="text" id="cust-name" placeholder="Naam / Name / 姓名" required>

      <button data-time="Nu" class="active">Nu</button>

</div>

<div class="hidden" id="success-view"></div>

<div class="order-footer">
  <a href="/privacy" target="_blank" id="footer-privacy">Privacy</a>
  <span>·</span>
  <a href="/tos" target="_blank" id="footer-tos">Terms</a>
  <span>·</span>
  <span id="footer-brand">SuriOrder</span>
</div>

<script src="/shared.js"></script>
<script>
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

const L = {
  nl:{shop_desc:"Gerechten bestellen",all:"Alles",cart_empty:"0 items",order_btn:"Bestellen",checkout_title:"Uw bestelling",name_ph:"Naam",phone_ph:"Telefoon (+597...)",note_ph:"Opmerkingen",submit:"Plaats bestelling",cancel:"Annuleren",success_title:"Gelukt!",success_msg:"Uw bestelling is geplaatst.",order_id:"Bestelling",total:"Totaal",share:"Delen via WhatsApp",annuleren:"Annuleren",pay_cod:"💵 Contant",pay_bank:"🏦 Overschrijving",bank_title:"Bank overschrijving",bank_details:"Maak over naar: ",confirm_wa:"Bevestig uw bestelling via WhatsApp",alert_name:"Vul uw naam in",alert_phone:"Vul uw telefoonnummer in",alert_phone_format:"Ongeldig telefoonnummer. Gebruik formaat +597XXXXXXX",alert_order_error:"Fout bij plaatsen bestelling",empty_menu:"Geen items beschikbaar",consent_text:"Ik ga akkoord met de <a href='/privacy' target='_blank'>privacyverklaring</a> en <a href='/tos' target='_blank'>servicevoorwaarden</a>",alert_consent:"Accepteer eerst de servicevoorwaarden en privacyverklaring",footer:"SuriOrder — WhatsApp-first bestellen voor Suriname",footer_privacy:"Privacy",footer_tos:"Voorwaarden"},
  zh:{shop_desc:"在线点餐",all:"全部",cart_empty:"0 件",order_btn:"下单",checkout_title:"确认订单",name_ph:"姓名",phone_ph:"电话 (+597...)",note_ph:"备注",submit:"提交订单",cancel:"取消",success_title:"下单成功！",success_msg:"您的订单已提交。",order_id:"订单号",total:"合计",share:"通过 WhatsApp 分享",annuleren:"取消",pay_cod:"💵 现金支付",pay_bank:"🏦 银行转账",bank_title:"银行转账信息",bank_details:"请转账至：",confirm_wa:"通过 WhatsApp 确认订单",alert_name:"请输入姓名",alert_phone:"请输入电话号码",alert_phone_format:"电话号码格式无效，请使用 +597XXXXXXX",alert_order_error:"订单提交失败",empty_menu:"暂无菜品",consent_text:"我同意<a href='/privacy' target='_blank'>隐私政策</a>和<a href='/tos' target='_blank'>服务条款</a>",alert_consent:"请先同意服务条款和隐私政策",footer:"SuriOrder — 苏里南 WhatsApp 优先点餐平台",footer_privacy:"隐私",footer_tos:"条款"},
  en:{shop_desc:"Order food",all:"All",cart_empty:"0 items",order_btn:"Order",checkout_title:"Your order",name_ph:"Name",phone_ph:"Phone (+597...)",note_ph:"Note",submit:"Place order",cancel:"Cancel",success_title:"Success!",success_msg:"Your order has been placed.",order_id:"Order",total:"Total",share:"Share via WhatsApp",annuleren:"Cancel",pay_cod:"💵 Cash",pay_bank:"🏦 Bank Transfer",bank_title:"Bank Transfer",bank_details:"Transfer to: ",confirm_wa:"Confirm your order via WhatsApp",alert_name:"Please enter your name",alert_phone:"Please enter your phone number",alert_phone_format:"Invalid phone number. Use format +597XXXXXXX",alert_order_error:"Failed to place order",empty_menu:"No items available",consent_text:"I agree to the <a href='/privacy' target='_blank'>Privacy Policy</a> and <a href='/tos' target='_blank'>Terms of Service</a>",alert_consent:"Please accept the Terms of Service and Privacy Policy first",footer:"SuriOrder — WhatsApp-first ordering for Suriname",footer_privacy:"Privacy",footer_tos:"Terms"},
  es:{shop_desc:"Pedir comida",all:"Todo",cart_empty:"0 items",order_btn:"Pedir",checkout_title:"Tu pedido",name_ph:"Nombre",phone_ph:"Teléfono (+597...)",note_ph:"Nota",submit:"Enviar pedido",cancel:"Cancelar",success_title:"¡Listo!",success_msg:"Tu pedido ha sido enviado.",order_id:"Pedido",total:"Total",share:"Compartir por WhatsApp",annuleren:"Cancelar",pay_cod:"💵 Efectivo",pay_bank:"🏦 Transferencia",bank_title:"Transferencia bancaria",bank_details:"Transferir a: ",confirm_wa:"Confirma tu pedido por WhatsApp",alert_name:"Ingresa tu nombre",alert_phone:"Ingresa tu número",alert_phone_format:"Número inválido. Usa formato +597XXXXXX",alert_order_error:"Error al enviar pedido",empty_menu:"Sin platos disponibles",consent_text:"Acepto la <a href='/privacy' target='_blank'>Política de Privacidad</a> y los <a href='/tos' target='_blank'>Términos de Servicio</a>",alert_consent:"Acepta primero los Términos y la Política de Privacidad",footer:"SuriOrder — Pedidos por WhatsApp en Surinam",footer_privacy:"Privacidad",footer_tos:"Términos"},
};

let shopId, shop, categories=[], items=[], cart={}, lang=localStorage.getItem('suriorder_lang')||'nl', pickupTime='Nu', paymentMethod='cod', activeCat=0;

function bindEvents() {
  // Language switch
  document.getElementById('lang-switch').addEventListener('click', function(e) {
    var btn = e.target.closest('button');
    if (!btn || !btn.dataset.lang) return;
    setLang(btn.dataset.lang);
  });

  // Cart button
  document.getElementById('cart-btn').addEventListener('click', showCheckout);

  // Payment methods
  document.getElementById('pay-methods').addEventListener('click', function(e) {
    var btn = e.target.closest('button');
    if (!btn || !btn.dataset.pay) return;
    setPayment(btn.dataset.pay);
  });

  // Pickup times
  document.getElementById('pickup-times').addEventListener('click', function(e) {
    var btn = e.target.closest('button');
    if (!btn || !btn.dataset.time) return;
    setPickup(btn.dataset.time, btn);
  });

  // Submit and cancel
  document.getElementById('submit-btn').addEventListener('click', submitOrder);
  document.getElementById('cancel-btn').addEventListener('click', hideCheckout);

  // Consent checkbox
  document.getElementById('consent-check').addEventListener('change', updateConsent);

  // Category nav delegation
  document.getElementById('cat-nav').addEventListener('click', function(e) {
    var btn = e.target.closest('button');
    if (!btn || btn.dataset.catId === undefined) return;
    filterCat(parseInt(btn.dataset.catId));
  });

  // Menu item actions delegation (qty buttons)
  document.getElementById('menu').addEventListener('click', function(e) {
    var btn = e.target.closest('button');
    if (!btn || !btn.dataset.itemId) return;
    changeQty(parseInt(btn.dataset.itemId), parseInt(btn.dataset.delta));
  });

  // Success view "new order" button delegation
  document.getElementById('success-view').addEventListener('click', function(e) {
    if (e.target.closest('#btn-reload')) location.reload();
  });
}

async function init(){
  bindEvents();
  var p = window.location.pathname.split('/');
  shopId = p[p.length-1] || 'demo';
  document.getElementById('menu').innerHTML = '<div style="display:flex;justify-content:center;align-items:center;padding:80px 0"><div class="spinner spinner--lg"></div></div>';
  try {
    var r = await fetch('/api/shop/' + shopId);
    if(!r.ok){ document.getElementById('shop-name').textContent='Shop not found'; document.getElementById('menu').innerHTML=''; return; }
    var d = await r.json();
    shop = d.shop; categories = d.categories; items = d.items;
    lang = shop.language || 'nl';
    var menuUrl = location.origin + '/order/' + shopId;
    document.getElementById('og-title').setAttribute('content', shop.name);
    document.getElementById('og-desc').setAttribute('content', t('shop_desc'));
    document.getElementById('og-url').setAttribute('content', menuUrl);
    document.title = shop.name + ' — Bestellen';
    if (shop.whatsapp_number) {
      var waBtn = document.getElementById('wa-contact');
      waBtn.href = 'https://wa.me/' + shop.whatsapp_number.replace(/[^0-9]/g, '');
      waBtn.style.display = '';
    }
    setLang(lang);
    renderAll();
  } catch (_) {
    document.getElementById('menu').innerHTML = '<p style="text-align:center;color:var(--text-sec);padding:60px">Failed to load menu. Please refresh.</p>';
  }
}

function t(key){ return L[lang]?.[key] || L.nl[key] || key; }
function tn(obj){ return obj?.['name_'+lang] || obj?.name || ''; }
function td(obj){ return obj?.['desc_'+lang] || obj?.desc || ''; }
function fmtPrice(n){ return 'SRD '+Number(n).toFixed(2); }

function setLang(l){
  lang=l;
  localStorage.setItem('suriorder_lang', l);
  document.querySelectorAll('.lang-switch button').forEach(function(b){ b.classList.toggle('active',b.id==='btn-'+l); });
  document.getElementById('consent-text').innerHTML = t('consent_text');
  document.getElementById('footer-privacy').textContent = t('footer_privacy');
  document.getElementById('footer-tos').textContent = t('footer_tos');
  document.getElementById('footer-brand').textContent = t('footer');
  renderAll();
}

function renderAll(){
  document.getElementById('shop-name').textContent = tn(shop) || shop.name;
  document.getElementById('shop-desc').textContent = t('shop_desc');
  var cn = document.getElementById('cat-nav');
  cn.innerHTML = '<button class="active" data-cat-id="0">' + t('all') + '</button>' + categories.map(function(c){ return '<button data-cat-id="'+c.id+'" aria-label="'+t('filter').replace('{cat}', esc(tn(c)||c.name))+'">'+esc(tn(c)||c.name)+'</button>'; }).join('');
  filterCat(0);
  updateCart();
}

function filterCat(cid){
  activeCat=cid;
  document.querySelectorAll('.cat-nav button').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.cat-nav button').forEach(function(b){ var catId=parseInt(b.dataset.catId); if(catId===cid||(cid===0&&!catId)) b.classList.add('active'); });
  var menu = document.getElementById('menu');
  var html='', lastCat=null;
  var filtered = cid===0 ? items : items.filter(function(i){ return i.category_id===cid; });
  filtered.forEach(function(i){
    if(cid===0 && i.category_id!==lastCat){
      var cat = categories.find(function(c){ return c.id===i.category_id; });
      if(cat) html+='<div class="cat-title">'+esc(tn(cat)||cat.name)+'</div>';
      lastCat = i.category_id;
    }
    var q = cart[i.id]||0;
    html+='<div class="item">'+
      '<div class="item-img">'+(i.image_url?'<img src="'+esc(i.image_url)+'" alt="">':'🍽️')+'</div>'+
      '<div class="item-info"><h3>'+esc(tn(i)||i.name)+'</h3><p>'+esc(td(i))+'</p></div>'+
      '<div class="item-action"><div class="item-price">'+fmtPrice(i.price)+'</div>'+
      '<div class="qty-ctrl"><button data-item-id="'+i.id+'" data-delta="-1" aria-label="'+t('remove_one').replace('{item}', esc(tn(i)||i.name))+'">−</button><span>'+q+'</span><button data-item-id="'+i.id+'" data-delta="1" aria-label="'+t('add_one').replace('{item}', esc(tn(i)||i.name))+'">+</button></div></div></div>';
  });
  if(!filtered.length) html='<p style="text-align:center;color:var(--muted);padding:40px">'+t('empty_menu')+'</p>';
  menu.innerHTML = html;
}

function changeQty(id,d){
  if(!cart[id]) cart[id]=0;
  cart[id]+=d;
  if(cart[id]<=0) delete cart[id];
  filterCat(activeCat);
  updateCart();
  // Cart bounce animation
  var bar = document.getElementById('cart-bar');
  bar.classList.remove('cart-bar--bounce');
  void bar.offsetWidth;
  bar.classList.add('cart-bar--bounce');
}

function updateCart(){
  var count=0,total=0;
  Object.entries(cart).forEach(function(e){
    var item=items.find(function(i){ return i.id===parseInt(e[0]); });
    if(item){ count+=e[1]; total+=item.price*e[1]; }
  });
  document.getElementById('cart-count').textContent = count + ' items';
  document.getElementById('cart-total').textContent = fmtPrice(total);
  document.getElementById('cart-btn').disabled = count===0;
}

function showCheckout(){
  if(!Object.keys(cart).length) return;
  document.getElementById('checkout-modal').classList.remove('hidden');
  document.getElementById('checkout-title').textContent = t('checkout_title');
  document.getElementById('cust-name').placeholder = t('name_ph');
  document.getElementById('cust-phone').placeholder = t('phone_ph');
  document.getElementById('cust-note').placeholder = t('note_ph');
  document.getElementById('pay-cod').textContent = t('pay_cod');
  document.getElementById('pay-bank_transfer').textContent = t('pay_bank');
  document.getElementById('bank-title').textContent = t('bank_title');
  var summary='',total=0;
  Object.entries(cart).forEach(function(e){
    var item=items.find(function(i){ return i.id===parseInt(e[0]); });
    if(item){ summary+='<div class="line"><span>'+e[1]+'x '+esc(tn(item)||item.name)+'</span><span>'+fmtPrice(item.price*e[1])+'</span></div>'; total+=item.price*e[1]; }
  });
  summary+='<div class="line line--total"><span>'+t('total')+'</span><span>'+fmtPrice(total)+'</span></div>';
  document.getElementById('order-summary').innerHTML = summary;
  setPayment(paymentMethod); // ensure active state
  document.getElementById('consent-text').innerHTML = t('consent_text');
  document.getElementById('consent-check').checked = false;
  updateConsent();
}

function hideCheckout(){ document.getElementById('checkout-modal').classList.add('hidden'); }

function updateConsent(){
  document.getElementById('submit-btn').disabled = !document.getElementById('consent-check').checked;
}

function setPickup(val,btn){
  pickupTime=val;
  document.querySelectorAll('.pickup-time button').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}

function setPayment(m){
  paymentMethod=m;
  document.querySelectorAll('.pay-methods button').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('pay-'+m).classList.add('active');
  if (m==='bank_transfer') {
    document.getElementById('bank-info').classList.remove('hidden');
    var bnk = shop.bank_name ? shop.bank_name+' — '+((shop.bank_account||''))+' ('+(shop.bank_account_name||'')+')' : t('bank_details')+'[configureer in admin]';
    document.getElementById('bank-details').textContent = t('bank_details') + bnk;
  } else {
    document.getElementById('bank-info').classList.add('hidden');
  }
}

async function submitOrder(){
  var name=document.getElementById('cust-name').value.trim();
  var phone=document.getElementById('cust-phone').value.trim();
  if(!name) return Toast.warn(t('alert_name'));
  if(!phone) return Toast.warn(t('alert_phone'));
  if(!/^\+?597\d{6,7}$/.test(phone)) return Toast.error(t('alert_phone_format'));
  if(!document.getElementById('consent-check').checked) return Toast.warn(t('alert_consent'));
  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '...';
  try {
  var items_arr = Object.entries(cart).map(function(e){ return {id:parseInt(e[0]), qty:e[1]}; });
  var r = await fetch('/api/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({shop_id:shopId,customer_name:name,customer_phone:phone,items:items_arr,note:document.getElementById('cust-note').value.trim(),pickup_time:pickupTime,payment_method:paymentMethod})});
  if(!r.ok){ var errData = await r.json().catch(function(){return {};}); btn.disabled = false; btn.textContent = t('submit'); Toast.error(errData.error || t('alert_order_error')); return; }
  var order=await r.json();
  document.getElementById('checkout-modal').classList.add('hidden');
  document.getElementById('cat-nav').classList.add('hidden');
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('cart-bar').classList.add('hidden');
  var sv = document.getElementById('success-view');
  sv.classList.remove('hidden');
  var link = location.origin + '/order/' + shopId;
  var waConfirmBtn = '';
  if (shop.whatsapp_number) {
    var waNum = shop.whatsapp_number.replace(/[^0-9]/g, '');
    var waMsg = encodeURIComponent('Hallo, ik heb bestelling #' + order.order_id + ' geplaatst. Bedankt!');
    waConfirmBtn = '<a class="share-btn" href="https://wa.me/'+waNum+'?text='+waMsg+'" target="_blank" rel="noopener">💬 '+t('confirm_wa')+'</a><br>';
  }
  sv.innerHTML = '<div class="success"><div class="icon">✅</div><h2>'+t('success_title')+'</h2><p>'+t('success_msg')+'</p><p style="font-weight:700;margin-top:8px">'+t('order_id')+': #'+esc(order.order_id)+'</p><p>'+t('total')+': '+fmtPrice(order.total)+'</p>'+waConfirmBtn+'<a class="share-btn" href="https://wa.me/?text='+encodeURIComponent('🍽️ '+shop.name+' - Bestel online: '+link)+'" target="_blank" rel="noopener">📱 '+t('share')+'</a><br><button class="btn btn--pri" id="btn-reload" style="margin-top:16px">Nieuwe bestelling</button></div>';
  cart={};updateCart();
  } catch(_) {
    btn.disabled = false; btn.textContent = t('submit');
    Toast.error(t('alert_order_error'));
  }
}

init();
</script>
</body>
</html>
