services:
  - type: web
    name: suriorder
    env: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: BASE_URL
        value: https://suriorder.onrender.com
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
