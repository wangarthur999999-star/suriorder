<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SuriOrder Admin</title>
<style>
:root{--pri:#22c55e;--bg:#f5f5f5;--card:#fff;--text:#1a1a1a;--muted:#666;--warn:#f59e0b;--danger:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}
.container{max-width:800px;margin:0 auto;padding:16px}
.login-box{max-width:360px;margin:80px auto;background:var(--card);padding:32px 24px;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.08);text-align:center}
.login-box h1{font-size:1.5rem;margin-bottom:8px;color:var(--pri)}
.login-box p{color:var(--muted);margin-bottom:20px}
.login-box input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;font-size:1rem;text-align:center}
.login-box button{width:100%;padding:12px;background:var(--pri);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:1rem;cursor:pointer}
.login-box button:hover{opacity:.9}
.dashboard{display:none}
header.top{background:var(--pri);color:#fff;padding:16px;text-align:center;margin-bottom:16px;position:relative}
header.top h1{font-size:1.2rem}
.admin-lang-switch{position:absolute;top:16px;right:16px;display:flex;gap:4px}
.admin-lang-switch button{background:rgba(255,255,255,.25);border:none;color:#fff;padding:3px 7px;border-radius:4px;font-size:.7rem;cursor:pointer}
.admin-lang-switch button.active{background:#fff;color:var(--pri);font-weight:600}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);padding:16px;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-card .label{font-size:.75rem;color:var(--muted);text-transform:uppercase}
.stat-card .value{font-size:1.5rem;font-weight:700;margin-top:4px}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--card);border-radius:12px;padding:4px}
.tabs button{flex:1;padding:10px;border:none;background:transparent;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer}
.tabs button.active{background:var(--pri);color:#fff}
.panel{display:none}
.panel.active{display:block}
table{width:100%;background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
th,td{padding:12px;text-align:left;font-size:.85rem;border-bottom:1px solid #f0f0f0}
th{background:#fafafa;font-weight:700;color:var(--muted)}
.order-status{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.75rem;font-weight:600}
.status-pending{background:#fef3c7;color:#92400e}
.status-confirmed{background:#dbeafe;color:#1e40af}
.status-done{background:#d1fae5;color:#065f46}
.status-cancelled{background:#fee2e2;color:#991b1b}
.form-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
input,textarea,select{flex:1;min-width:120px;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:.85rem}
.btn{display:inline-block;padding:10px 16px;border:none;border-radius:8px;font-weight:700;font-size:.85rem;cursor:pointer}
.btn-pri{background:var(--pri);color:#fff}
.btn-warn{background:var(--warn);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.qr-section{text-align:center;padding:40px;background:var(--card);border-radius:12px;margin-top:16px}
.qr-section canvas{display:block;margin:16px auto}
.qr-section input{width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;margin-top:8px;font-size:.8rem;text-align:center}
.menu-link-box{background:#f0fdf4;border:2px dashed var(--pri);border-radius:12px;padding:16px;margin-bottom:16px;text-align:center;word-break:break-all}
.wizard-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center}
.wizard-box{background:var(--card);width:100%;max-width:440px;border-radius:16px;padding:32px 24px;text-align:center;max-height:90vh;overflow-y:auto}
.wizard-box h2{color:var(--pri);margin-bottom:8px;font-size:1.2rem}
.wizard-box p.step-hint{color:var(--muted);font-size:.8rem;margin-bottom:16px}
.wizard-box .step-dots{display:flex;justify-content:center;gap:6px;margin-bottom:20px}
.wizard-box .step-dot{width:8px;height:8px;border-radius:50%;background:#ddd}
.wizard-box .step-dot.done{background:var(--pri)}
.wizard-box input,.wizard-box textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:.9rem;margin-bottom:10px}
.wizard-box textarea{height:60px;resize:none}
.wizard-box button.wiz-next{width:100%;padding:12px;background:var(--pri);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:1rem;cursor:pointer;margin-top:8px}
.wizard-box button.wiz-skip{width:100%;padding:10px;background:transparent;color:var(--muted);border:none;font-size:.85rem;cursor:pointer;margin-top:4px}
.wizard-box .shop-id-display{background:#f0fdf4;border:2px dashed var(--pri);border-radius:10px;padding:16px;font-size:1.5rem;font-weight:700;letter-spacing:2px;margin:12px 0;word-break:break-all}
.shop-id-display-btn{background:var(--pri);color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:.8rem;cursor:pointer}
.wizard-item-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.wizard-item-row input{flex:1;min-width:0;margin-bottom:0}
.notification-banner{display:none;background:var(--warn);color:#fff;padding:10px 16px;border-radius:10px;margin-bottom:12px;text-align:center;font-weight:600;animation:pulse 1s ease-in-out 3}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
.stat-pulse{animation:statPulse .5s ease-in-out 3}
@keyframes statPulse{0%,100%{background:var(--card)}50%{background:#fef3c7}}

</head>
<body>
<div class="login-box" id="login-box">
  <h1>🍽️ SuriOrder</h1>
  <p id="login-subtitle">Beheer uw menu en bestellingen</p>
  <input type="text" id="login-shop-id" placeholder="Shop ID">
  <input type="password" id="login-pin" placeholder="PIN Code">
  <button onclick="login()" id="login-btn">Inloggen</button>
  <p style="margin-top:16px;font-size:.8rem;color:var(--muted)" id="no-account">Nog geen account? <a href="#" onclick="showRegister()" style="color:var(--pri)">Registreer</a></p>
</div>
<div class="login-box" id="register-box" style="display:none">
  <h1>🍽️ <span id="reg-title">Nieuwe Shop</span></h1>
  <p id="reg-subtitle">Maak uw gratis account aan</p>
  <input type="text" id="reg-name" placeholder="Bedrijfsnaam / Business name">
  <input type="tel" id="reg-phone" placeholder="Telefoonnummer">
  <input type="password" id="reg-pin" placeholder="Kies een PIN code (min 4 cijfers)">
  <select id="reg-lang"><option value="nl">Nederlands</option><option value="en">English</option><option value="zh">中文</option><option value="srn">Sranan Tongo</option></select>
  <button onclick="register()" id="reg-btn">Account aanmaken</button>
  <p style="margin-top:12px;font-size:.8rem;color:var(--muted)" id="back-login"><a href="#" onclick="showLogin()" style="color:var(--pri)">Terug naar login</a></p>
</div>
<div class="container dashboard" id="dashboard">
<div class="notification-banner" id="notif-banner"></div>
<div class="wizard-overlay" id="wizard-overlay" style="display:none">
  <div class="wizard-box" id="wizard-box"></div>
</div>
<div class="menu-link-box" id="menu-link-box"></div>
<header class="top" style="border-radius:12px">
  <div class="admin-lang-switch">
    <button onclick="setAdminLang('nl')" class="active" id="adm-btn-nl">NL</button>
    <button onclick="setAdminLang('en')" id="adm-btn-en">EN</button>
    <button onclick="setAdminLang('zh')" id="adm-btn-zh">中文</button>
    <button onclick="setAdminLang('srn')" id="adm-btn-srn">SRN</button>
  </div>
  <h1 id="dash-shop-name">Dashboard</h1>
  <p style="font-size:.8rem;opacity:.8" id="dash-shop-id"></p>
</header>
<div class="stats" id="stats"></div>
<div class="tabs">
  <button class="active" onclick="switchTab('orders')" id="tab-orders">Bestellingen</button>
  <button onclick="switchTab('menu')" id="tab-menu">Menu</button>
  <button onclick="switchTab('share')" id="tab-share">Delen</button>
  <button onclick="switchTab('settings')" id="tab-settings">Instellingen</button>
</div>
<div class="panel active" id="panel-orders">
  <table><thead><tr><th>#</th><th id="th-customer">Klant</th><th id="th-items">Items</th><th id="th-total">Totaal</th><th id="th-time">Tijd</th><th id="th-status">Status</th><th id="th-action">Actie</th></tr></thead><tbody id="orders-tbody"></tbody></table>
</div>
<div class="panel" id="panel-menu">
  <div class="form-row">
    <input type="text" id="item-name" placeholder="Naam gerecht (NL)">
    <input type="text" id="item-name-zh" placeholder="名称 (中文)">
    <input type="text" id="item-name-en" placeholder="Name (EN)">
    <input type="text" id="item-name-srn" placeholder="Nen (SRN)">
    <input type="number" id="item-price" placeholder="Prijs (SRD)" step="0.01">
    <select id="item-cat"><option value="">Categorie</option></select>
    <button class="btn btn-pri" onclick="addItem()">+ Toevoegen</button>
  </div>
  <div id="items-list"></div>
</div>
<div class="panel" id="panel-share">
  <div class="qr-section">
    <h3>📱 <span id="share-title">Deel uw menu link</span></h3>
    <p style="margin:8px 0;color:var(--muted)" id="share-desc">Klanten openen deze link op hun telefoon</p>
    <input type="text" id="menu-url" readonly onclick="this.select()">
    <p style="margin-top:8px" id="share-wa"><strong>WhatsApp:</strong> kopieer de link en stuur naar klanten</p>
    <img id="qr-image" src="" alt="QR Code" style="max-width:220px;margin:16px auto;display:block" onerror="this.style.display='none'">
    <p style="font-size:.75rem;color:var(--muted)">Print deze QR code en hang in uw zaak</p>
  </div>
</div>
<div class="panel" id="panel-settings">
  <div style="background:var(--card);padding:24px;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);max-width:500px">
    <h3 id="settings-title" style="margin-bottom:12px">Winkel Instellingen</h3>
    <label style="font-size:.8rem;color:var(--muted)"><span id="lbl-welcome">Welkomstbericht</span></label>
    <textarea id="set-welcome" style="width:100%;margin-bottom:12px;min-height:50px"></textarea>
    <label style="font-size:.8rem;color:var(--muted)"><span id="lbl-wa">WhatsApp nummer</span></label>
    <input type="tel" id="set-wa" style="width:100%;margin-bottom:12px">
    <label style="font-size:.8rem;color:var(--muted)"><span id="lbl-lang">Taal</span></label>
    <select id="set-lang" style="width:100%;margin-bottom:12px">
      <option value="nl">Nederlands</option><option value="en">English</option><option value="zh">中文</option><option value="srn">Sranan Tongo</option>
    </select>
    <hr style="margin:16px 0;border-color:#eee">
    <label style="font-size:.8rem;color:var(--muted)"><span id="lbl-bank-name">Bank naam</span></label>
    <input type="text" id="set-bank-name" style="width:100%;margin-bottom:12px" placeholder="DSB / Hakrinbank / ...">
    <label style="font-size:.8rem;color:var(--muted)"><span id="lbl-bank-acc">Rekeningnummer</span></label>
    <input type="text" id="set-bank-acc" style="width:100%;margin-bottom:12px">
    <label style="font-size:.8rem;color:var(--muted)"><span id="lbl-bank-holder">Op naam van</span></label>
    <input type="text" id="set-bank-holder" style="width:100%;margin-bottom:16px">
    <button class="btn btn-pri" onclick="saveSettings()" style="width:100%" id="save-settings-btn">Opslaan</button>
  </div>
</div>
</div>

function loadShareTab() {
  const qrImg = document.getElementById('qr-image');
  if (qrImg) qrImg.src = '/api/shop/' + shop.id + '/qr';
}

function updateMenuLinkBox() {
  if (!shop) return;
  const link = `${location.origin}/order/${shop.id}`;
  document.getElementById('menu-link-box').innerHTML = `🔗 ${t('menu_link_label')} <strong><a href="${esc(link)}" target="_blank">${esc(link)}</a></strong> <button class="btn btn-pri" style="margin-left:8px;padding:4px 10px;font-size:.75rem" onclick="navigator.clipboard.writeText('${esc(link)}')">${t('copy_btn')}</button>`;
  document.getElementById('menu-url').value = link;
}

function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }; }

function showRegister(){document.getElementById('login-box').style.display='none';document.getElementById('register-box').style.display='block'}
function showLogin(){document.getElementById('register-box').style.display='none';document.getElementById('login-box').style.display='block'}

async function register(){
  const name=document.getElementById('reg-name').value.trim(),phone=document.getElementById('reg-phone').value.trim(),pin=document.getElementById('reg-pin').value.trim(),lang=document.getElementById('reg-lang').value;
  if(!name||!pin) return alert(t('alert_name_pin'));
  if(pin.length<4) return alert(t('alert_pin_min'));
  const r=await fetch('/api/shops',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,phone,language:lang,admin_pin:pin,whatsapp_number:phone})});
  if(!r.ok){ const e=await r.json().catch(()=>({})); return alert(e.error||t('alert_reg_error')); }
  const d=await r.json();
  token = d.token;
  document.getElementById('login-shop-id').value=d.id;
  document.getElementById('login-pin').value='';
  alert(t('alert_account_created').replace('{id}', d.id));
  showLogin();
  const r2 = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({shop_id:d.id,admin_pin:pin})});
  const d2 = await r2.json();
  token = d2.token; shop = d2.shop;
  adminLang = shop.language || 'nl';
  showDashboard();
}

async function login(){
  const id=document.getElementById('login-shop-id').value.trim(),pin=document.getElementById('login-pin').value.trim();
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({shop_id:id,admin_pin:pin})});
  if(!r.ok) return alert(t('alert_invalid_login'));
  const d=await r.json();token=d.token;shop=d.shop;
  adminLang = shop.language || 'nl';
  setAdminLang(adminLang);
  showDashboard();
}

function showDashboard(){
  document.getElementById('login-box').style.display='none';
  document.getElementById('register-box').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('dash-shop-name').textContent=shop.name;
  document.getElementById('dash-shop-id').textContent='ID: '+shop.id;
  updateMenuLinkBox();
  updateUITexts();
  loadDashboard();loadOrders();loadItems();
  if (!shop.wizard_complete) {
    startWizard();
  } else {
    startNotificationPolling();
  }
}

async function loadDashboard(){
  const r=await fetch('/api/admin/dashboard',{headers:authHeaders()});
  const d=await r.json();
  document.getElementById('stats').innerHTML=`
    <div class="stat-card"><div class="label">${t('stats_today_orders')}</div><div class="value">${d.ordersToday?.count||0}</div></div>
    <div class="stat-card"><div class="label">${t('stats_today_revenue')}</div><div class="value">SRD ${(d.ordersToday?.total||0).toFixed(0)}</div></div>
    <div class="stat-card"><div class="label">${t('stats_week_revenue')}</div><div class="value">SRD ${(d.ordersWeek?.total||0).toFixed(0)}</div></div>
    <div class="stat-card" id="stat-pending"><div class="label">${t('stats_pending')}</div><div class="value">${d.pending?.count||0}</div></div>`;
}

async function loadOrders(){
  const r=await fetch('/api/admin/orders',{headers:authHeaders()});
  const orders=await r.json();
  document.getElementById('orders-tbody').innerHTML=orders.map(o=>{
    let items;try{items=JSON.parse(o.items_json)}catch(e){items=[]}
    const sc='status-'+esc(o.status);
    const pm=o.payment_method==='bank_transfer'?'🏦':'💵';
    const psMap={unpaid:'pay_unpaid',paid:'pay_paid',refunded:'pay_refunded'};
    const ps=psMap[o.payment_status]||'pay_unpaid';
    const psBadge=o.payment_status==='paid'?'style="background:#d1fae5;color:#065f46"':(o.payment_status==='refunded'?'style="background:#fee2e2;color:#991b1b"':'style="background:#fef3c7;color:#92400e"');
    let payBtn='';
    if(o.payment_status==='unpaid')payBtn=`<button class="btn btn-pri" style="padding:2px 6px;font-size:.65rem;margin-right:2px" onclick="updatePaymentStatus('${esc(o.id)}','paid')">${t('mark_paid')}</button>`;
    if(o.payment_status==='paid')payBtn=`<button class="btn btn-danger" style="padding:2px 6px;font-size:.65rem" onclick="updatePaymentStatus('${esc(o.id)}','refunded')">${t('mark_refunded')}</button>`;
    return `<tr><td>#${esc(String(o.id))}</td><td>${esc(o.customer_name)}</td><td>${items.map(i=>`${i.qty}x ${esc(i.name)}`).join(', ')}</td><td>SRD ${o.total.toFixed(2)} <span ${psBadge} style="display:inline-block;padding:1px 5px;border-radius:8px;font-size:.7rem;margin-left:4px">${t(ps)}</span> ${payBtn}</td><td>${esc(o.created_at?.slice(11,16)||'')}</td><td><span class="order-status ${sc}">${esc(o.status)}</span></td><td><select onchange="updateOrderStatus('${esc(o.id)}',this.value)" style="font-size:.75rem;padding:4px"><option value="">${t('actie')}</option><option value="confirmed">${t('bevestig')}</option><option value="done">${t('klaar')}</option><option value="cancelled">${t('annuleer')}</option></select></td></tr>`}).join('')||'<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--muted)">'+t('empty_orders')+'</td></tr>';
}

async function updateOrderStatus(id,s){
  if(!s)return;
  await fetch(`/api/admin/orders/${id}`,{method:'PUT',headers:authHeaders(),body:JSON.stringify({status:s})});
  loadOrders();loadDashboard();
}

async function loadItems(){
  const r=await fetch('/api/admin/items',{headers:authHeaders()});
  const items=await r.json();
  const cats=await (await fetch('/api/admin/categories',{headers:authHeaders()})).json();
  document.getElementById('item-cat').innerHTML='<option value="">'+t('cat_opt')+'</option>'+cats.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
  document.getElementById('items-list').innerHTML='<table><thead><tr><th>'+t('th_name')+'</th><th>'+t('th_cat')+'</th><th>'+t('th_price')+'</th><th></th></tr></thead><tbody>'+items.map(i=>`<tr><td>${esc(i.name)}${i.name_zh?' / '+esc(i.name_zh):''}${i.name_srn?' / '+esc(i.name_srn):''}</td><td>${esc(i.category_name||'-')}</td><td>SRD ${i.price.toFixed(2)}</td><td><button class="btn btn-danger" style="padding:2px 8px;font-size:.7rem" onclick="deleteItem(${i.id})">X</button></td></tr>`).join('')+'</tbody></table>';
}

async function addItem(){
  const name=document.getElementById('item-name').value.trim(),
        name_zh=document.getElementById('item-name-zh').value.trim(),
        name_en=document.getElementById('item-name-en').value.trim(),
        name_srn=document.getElementById('item-name-srn').value.trim(),
        price=parseFloat(document.getElementById('item-price').value),
        category_id=document.getElementById('item-cat').value||null;
  if(!name||!price) return alert(t('alert_name_price'));
  await fetch('/api/admin/items',{method:'POST',headers:authHeaders(),body:JSON.stringify({name,name_zh,name_en,name_srn,price,category_id:category_id?parseInt(category_id):null})});
  document.getElementById('item-name').value='';document.getElementById('item-name-zh').value='';document.getElementById('item-name-en').value='';document.getElementById('item-name-srn').value='';document.getElementById('item-price').value='';
  loadItems();
}

async function deleteItem(id){if(confirm(t('alert_delete'))){await fetch(`/api/admin/items/${id}`,{method:'DELETE',headers:authHeaders()});loadItems()}}

function switchTab(t){tab=t;document.querySelectorAll('.tabs button').forEach((b,i)=>{b.classList.toggle('active',i===['orders','menu','share','settings'].indexOf(t))});document.querySelectorAll('.panel').forEach(p=>{p.classList.toggle('active',p.id==='panel-'+t)});if(t==='orders')loadOrders();if(t==='menu')loadItems();if(t==='share')loadShareTab();if(t==='settings')loadSettings()}

function loadSettings() {
  document.getElementById('set-welcome').value = shop.welcome_msg || '';

  const data = {
    welcome_msg: document.getElementById('set-welcome').value.trim(),
    whatsapp_number: document.getElementById('set-wa').value.trim(),
    language: document.getElementById('set-lang').value,
    bank_name: document.getElementById('set-bank-name').value.trim(),

  };

// ─ Setup Wizard ─
let wizStep = 0, wizData = {};

function startWizard() {
  wizStep = 1; wizData = {};
  document.getElementById('wizard-overlay').style.display = 'flex';
  renderWizard();
}

function endWizard() {
  document.getElementById('wizard-overlay').style.display = 'none';
  fetch(`/api/shops/${shop.id}/setup`, {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify({ ...wizData, wizard_complete: true })
  }).then(() => {
    startNotificationPolling();
  });
}

function renderWizard() {
  const box = document.getElementById('wizard-box');
  const dots = Array(5).fill(0).map((_,i) => `<span class="step-dot${i < wizStep ? ' done' : ''}"></span>`).join('');
  let html = `<div class="step-dots">${dots}</div>`;

  if (wizStep === 1) {
    html += `<h2>${t('wizard_step1_title')}</h2><p class="step-hint">${t('wizard_step1_desc')}</p>`;
    html += `<div class="shop-id-display">${shop.id}</div>`;
    html += `<button class="shop-id-display-btn" onclick="copyShopId(event)">📋 ${t('wizard_copy')}</button>`;
    html += `<button class="wiz-next" onclick="wizNext()">${t('wizard_next')}</button>`;
  } else if (wizStep === 2) {
    html += `<h2>${t('wizard_step2_title')}</h2><p class="step-hint">${t('wizard_step2_desc')}</p>`;
    html += `<input type="tel" id="wiz-wa" placeholder="${t('wizard_step2_ph')}" value="${esc(shop.whatsapp_number || '')}">`;
    html += `<button class="wiz-next" onclick="wizSave('whatsapp_number',document.getElementById('wiz-wa').value)">${t('wizard_next')}</button>`;
    html += `<button class="wiz-skip" onclick="wizNext()">${t('wizard_skip')}</button>`;
  } else if (wizStep === 3) {
    html += `<h2>${t('wizard_step3_title')}</h2><p class="step-hint">${t('wizard_step3_desc')}</p>`;
    html += `<div id="wiz-items"><div class="wizard-item-row"><input type="text" id="wiz-item-name-0" placeholder="${t('wizard_step3_name')}"><input type="number" id="wiz-item-price-0" placeholder="${t('wizard_step3_price')}" step="0.01" style="max-width:100px"></div></div>`;
    html += `<button class="wiz-skip" onclick="addWizItemRow()" style="margin-bottom:8px">${t('wizard_add_item')}</button>`;
    html += `<button class="wiz-next" onclick="wizSaveMenu()">${t('wizard_next')}</button>`;
    html += `<button class="wiz-skip" onclick="wizNext()">${t('wizard_skip')}</button>`;
    wizItemCount = 1;
  } else if (wizStep === 4) {
    const link = `${location.origin}/order/${shop.id}`;
    html += `<h2>${t('wizard_step4_title')}</h2><p class="step-hint">${t('wizard_step4_desc')}</p>`;
    html += `<div class="menu-link-box"><strong>${esc(link)}</strong></div>`;
    html += `<button class="btn btn-pri" style="margin-bottom:8px" onclick="navigator.clipboard.writeText('${esc(link)}')">📋 ${t('wizard_copy')}</button><br>`;
    html += `<a class="btn btn-pri" style="display:inline-block;margin-bottom:4px;background:#25D366;text-decoration:none" href="https://wa.me/?text=${encodeURIComponent(shop.name+' - '+t('share_desc')+': '+link)}" target="_blank">📱 WhatsApp</a><br>`;
    html += `<button class="wiz-next" onclick="wizNext()">${t('wizard_next')}</button>`;
  } else if (wizStep === 5) {
    html += `<h2>${t('wizard_step5_title')}</h2><p class="step-hint">${t('wizard_step5_desc')}</p>`;
    html += `<button class="wiz-next" onclick="endWizard()">${t('wizard_done')}</button>`;
  }

  box.innerHTML = html;
}

let wizItemCount = 1;
function addWizItemRow() {
  const container = document.getElementById('wiz-items');
  const row = document.createElement('div');
  row.className = 'wizard-item-row';
  row.innerHTML = `<input type="text" id="wiz-item-name-${wizItemCount}" placeholder="${t('wizard_step3_name')}"><input type="number" id="wiz-item-price-${wizItemCount}" placeholder="${t('wizard_step3_price')}" step="0.01" style="max-width:100px">`;
  container.appendChild(row);
  wizItemCount++;
}

function wizSave(key, value) {
  if (value) wizData[key] = value;
  wizNext();
}

function wizSaveMenu() {
  const menu_items = [];
  for (let i = 0; i < wizItemCount; i++) {
    const nameEl = document.getElementById('wiz-item-name-' + i);
    const priceEl = document.getElementById('wiz-item-price-' + i);
    if (nameEl && priceEl && nameEl.value.trim() && priceEl.value) {
      menu_items.push({ name: nameEl.value.trim(), price: parseFloat(priceEl.value) });
    }
  }
  if (menu_items.length) wizData.menu_items = menu_items;
  wizNext();
}

function wizNext() { wizStep++; renderWizard(); }

function copyShopId(ev) {
  navigator.clipboard.writeText(shop.id);
  const btn = ev.target;
  btn.textContent = '✓ Gekopieerd!';
  setTimeout(() => { btn.textContent = '📋 ' + t('wizard_copy'); }, 1500);
}

// ─ Order Notification Polling ─
let lastOrderId = null, pollTimer = null;

function startNotificationPolling() {
  if (pollTimer) return;
  if (Notification.permission === 'default') {
    Notification.requestPermission();
  }
  fetch('/api/admin/orders?limit=5', { headers: authHeaders() })
    .then(r => r.json())
    .then(orders => {
      if (orders.length) lastOrderId = orders[0].id;
    });
  pollTimer = setInterval(checkNewOrders, 15000);
}

async function checkNewOrders() {
  try {
    const r = await fetch('/api/admin/orders?limit=5', { headers: authHeaders() });
    if (!r.ok) return;
    const orders = await r.json();
    if (!orders.length) return;
    if (lastOrderId && orders[0].id !== lastOrderId) {
      const newOrders = [];
      for (const o of orders) {
        if (o.id === lastOrderId) break;
        newOrders.push(o);
      }
      if (newOrders.length) {
        for (const o of newOrders.reverse()) {
          showNotification(o);
        }
        lastOrderId = orders[0].id;
        loadOrders();
        loadDashboard();
        document.getElementById('stat-pending').classList.add('stat-pulse');
        setTimeout(() => document.getElementById('stat-pending').classList.remove('stat-pulse'), 1500);
      }
    }
    if (!lastOrderId) lastOrderId = orders[0].id;
  } catch (e) { /* ignore polling errors */ }
}

function showNotification(order) {
  // Browser notification
  if (Notification.permission === 'granted') {
    new Notification(t('notif_new_order'), {
      body: `${t('notif_from')} ${order.customer_name} — SRD ${order.total.toFixed(2)}`,
      icon: '/favicon.ico'
    });
  }
  // Sound
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.value = 0.2;
    osc.start(); osc.stop(ctx.currentTime + 0.12);
    setTimeout(() => {
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc2.frequency.value = 1100;
      gain2.gain.value = 0.2;
      osc2.start(); osc2.stop(ctx.currentTime + 0.15);
    }, 150);
  } catch (e) { /* audio not available */ }
  // Banner
  const banner = document.getElementById('notif-banner');
  banner.textContent = `🔔 ${t('notif_new_order')} ${t('notif_from')} ${order.customer_name} — SRD ${order.total.toFixed(2)}`;
  banner.style.display = 'block';
  setTimeout(() => { banner.style.display = 'none'; }, 5000);
}

showLogin();
